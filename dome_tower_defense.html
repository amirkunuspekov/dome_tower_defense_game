<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dome Tower Defense</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="hud">
      <div class="stat">
        <span class="stat-label">Score</span
        ><span class="stat-value" id="score-val">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Lives</span
        ><span class="stat-value" id="lives-val">5</span>
      </div>
      <div class="stat">
        <span class="stat-label">Wave</span
        ><span class="stat-value" id="wave-val">1</span>
      </div>
      <div class="stat">
        <span class="stat-label">Combo</span
        ><span class="stat-value" id="combo-val">—</span>
      </div>
      <div class="stat">
        <span class="stat-label">Best</span
        ><span class="stat-value" id="best-val">0</span>
      </div>
    </div>

    <div id="wave-bar-wrap">
      <div id="wave-bar-label">Wave progress</div>
      <div id="wave-bar"><div id="wave-fill"></div></div>
    </div>

    <div id="powerup-hud">
      <div class="pu-badge shield inactive" id="shield-badge">
        &#x1F6E1; Shield <span class="pu-timer" id="shield-timer"></span>
      </div>
      <div class="pu-badge beam inactive" id="beam-badge">
        &#x26A1; Power beam <span class="pu-timer" id="beam-timer"></span>
      </div>
      <div class="pu-badge freeze inactive" id="freeze-badge">
        &#x2744; Freeze <span class="pu-timer" id="freeze-timer"></span>
      </div>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <div id="msg">Press Start to play</div>
    <button id="start-btn">Start game</button>
  </body>
</html>
